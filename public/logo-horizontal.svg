      C 62 42, 58 30, 52 20
      L 45 25
      C 48 40, 50 55, 48 70
      L 38 70
      C 40 55, 38 40, 35 28
      L 10 30
      C 5 45, 0 60, -5 75
      L -15 75
      C -8 58, -2 42, 2 28
